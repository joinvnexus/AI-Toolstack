name: Dependency Governance

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies (high+)
        run: npm run audit:prod

      - name: Audit full dependency tree (moderate+)
        run: npm run audit:full

  outdated-report:
    name: outdated-report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture outdated package report
        run: npm outdated --long > outdated-report.txt || true

      - name: Upload outdated report artifact
        uses: actions/upload-artifact@v4
        with:
          name: outdated-report
          path: outdated-report.txt
